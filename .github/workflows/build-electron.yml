name: Build Electron Windows

on:
    workflow_dispatch:
    push:
        branches:
            - main
        tags:
            - "v*"

jobs:
    build-windows:
        runs-on: windows-latest
        permissions:
            contents: write

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20

            - name: Install dependencies
              run: npm install

            - name: Build Windows installer
              run: npm run dist

            # Sur un tag v* → crée une GitHub Release et attache le .exe
            - name: Create GitHub Release
              if: startsWith(github.ref, 'refs/tags/v')
              uses: softprops/action-gh-release@v2
              with:
                  name: "Blindtest Buzzer ${{ github.ref_name }}"
                  draft: false
                  prerelease: false
                  files: |
                      release/*.exe
                      release/*.blockmap
                      release/*.yml

            # Sur main (hors tag) → simple artefact de build
            - name: Upload build artifact
              if: "!startsWith(github.ref, 'refs/tags/v')"
              uses: actions/upload-artifact@v4
              with:
                  name: blindtest-buzzer-windows
                  path: |
                      release/*.exe
                      release/*.yml
                      release/*.blockmap
                  if-no-files-found: error
